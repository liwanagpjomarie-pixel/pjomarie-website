<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTIM — Daily Time In Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ======================================================
       LOGIN VIEW
  ====================================================== -->
  <div id="view-login" class="view">
    <div class="login-bg">
      <div class="login-glow"></div>
    </div>
    <div class="login-wrap">
      <div class="login-brand">
        <div class="brand-clock">⏱</div>
        <h1>DTIM</h1>
        <p>Daily Time In Motion</p>
      </div>

      <div class="login-card">
        <div class="login-card-inner">
          <h2>Sign In</h2>
          <p class="login-sub">Enter your work email to access your dashboard.</p>

          <div class="form-group">
            <label for="login-email">Work Email / Gmail</label>
            <div class="input-icon-wrap">
              <span class="input-icon">✉</span>
              <input
                id="login-email"
                type="email"
                class="form-control with-icon"
                placeholder="yourname@company.com"
                autocomplete="email"
                onkeydown="if(event.key==='Enter') App.handleLogin()"
              >
            </div>
          </div>

          <p id="login-error" class="error-msg" aria-live="polite"></p>

          <button id="btn-login" class="btn btn-primary btn-full login-btn" onclick="App.handleLogin()">
            Sign In →
          </button>

          <p class="login-note">
            Access is determined by your email in the employee database.<br>
            No password required.
          </p>
        </div>
      </div>

      <div class="login-footer">
        <span>DTIM v2.0</span>
        <span>·</span>
        <span>Mode: <strong id="mode-indicator">Live</strong></span>
      </div>
    </div>
  </div>

  <!-- ======================================================
       APP VIEW
  ====================================================== -->
  <div id="view-app" class="view">
    <div class="app-shell">

      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-brand">
          <span class="sb-icon">⏱</span>
          <span class="sb-label">DTIM</span>
        </div>

        <div id="sidebar-user" class="sidebar-user"></div>

        <nav id="sidebar-nav" class="sidebar-nav"></nav>

        <div class="sidebar-footer">
          <button class="nav-item logout-btn" onclick="Auth.logout()">
            <span class="nav-icon">⏏</span>
            <span>Logout</span>
          </button>
        </div>
      </aside>

      <!-- Main -->
      <main id="main-content" class="main-content">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading dashboard...</p>
        </div>
      </main>

    </div>
  </div>

</div><!-- /#app -->

<!-- ========================================================
     MODAL
======================================================== -->
<div id="modal-overlay" class="hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="hideModal()" aria-label="Close">✕</button>
    </div>
    <div id="modal-body"   class="modal-body"></div>
    <div id="modal-footer" class="modal-footer"></div>
  </div>
</div>

<!-- ========================================================
     TOAST NOTIFICATIONS
======================================================== -->
<div id="toast-container" aria-live="polite"></div>

<!-- ========================================================
     SCRIPTS
======================================================== -->
<script src="utils.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script src="tasks.js"></script>
<script src="reports.js"></script>
<script src="dashboard.js"></script>
<script src="app.js"></script>

<script>
  // Show mode indicator
  document.addEventListener('DOMContentLoaded', () => {
    const mi = document.getElementById('mode-indicator');
    if (mi) mi.textContent = typeof USE_MOCK_DATA !== 'undefined' && USE_MOCK_DATA ? 'Mock' : 'Live';
  });
</script>

</body>
</html>
